name: "Execução Agendada de Testes"

# Gatilho de execução agendada baseado em expressões Cron do GitHub Actions
on:
  schedule:
    # Roda toda segunda-feira à meia-noite UTC (21:00 de domingo no horário de Brasília)
    - cron: "0 0 * * 1"

# Princípio do menor privilégio: aplica apenas a permissão estritamente necessária para o job
permissions:
  contents: read # Permite clonar o código do repositório de forma segura

jobs:
  tests:
    # Define um ambiente Linux virtual limpo e isolado (Runner) fornecido pelo GitHub
    runs-on: ubuntu-latest

    steps:
      # Baixa o código-fonte do repositório para dentro do Runner
      - name: Checkout do código
        uses: actions/checkout@v4

      # Instala o ambiente do Node.js na versão estável do projeto
      - name: Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # Instalação rápida e idempotente (Clean Install), baseada estritamente no package-lock.json
      - name: Instalando dependências do projeto
        run: npm ci

      # Executa a suíte de testes unitários algorítmicos da camada Model via Mocha/Chai
      - name: Executando os testes unitários (Mocha)
        run: npm test

      # Executa os testes de interface gráfica levantando um servidor HTTP local temporário
      - name: Executando os testes E2E (Cypress)
        uses: cypress-io/github-action@v6
        with:
          command: npm run cypress:run
          start: npx http-server src -p 5500 # Sobe o frontend simulando o servidor real
          wait-on: "http://localhost:5500/index.html" # Aguarda a página ficar online para soltar os testes

      # =================================================================
      # ARMAZENAMENTO DE RELATÓRIOS NA PIPELINE
      # =================================================================

      # Compacta e guarda o report HTML do Mocha como artefato durável na esteira
      - name: Upload do relatório Mochawesome (Unitários)
        uses: actions/upload-artifact@v4
        # Evidência de QA: garante o relatório mesmo se houver falha de testes
        if: always()
        with:
          name: mocha-unit-report
          path: mochawesome-report/

      # Compacta e guarda as evidências e telas do Cypress como artefato durável na esteira
      - name: Upload do relatório Cypress (Ponta a Ponta)
        uses: actions/upload-artifact@v4
        #permite debugar a interface caso os testes quebrem
        if: always()
        with:
          name: Relatorio-Testes-E2E-Agendada
          path: cypress/reports/
          if-no-files-found: error
