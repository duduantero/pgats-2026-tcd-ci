name: "Execução Manual de Testes e Deploy"

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Instalando dependências do projeto
        run: npm ci

      - name: Executando os testes unitários (Mocha)
        run: npm test

      - name: Executando os testes E2E (Cypress)
        uses: cypress-io/github-action@v6
        with:
          command: npm run cypress:run
          start: npx http-server src -p 5500
          wait-on: "http://localhost:5500/index.html"

      - name: Upload do relatório Mochawesome (Unitários)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mocha-unit-report
          path: mochawesome-report/

      - name: Configurar ambiente do GitHub Pages
        uses: actions/configure-pages@v5

      - name: Compactar artefatos do Frontend (Pasta src)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "src/"

      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
